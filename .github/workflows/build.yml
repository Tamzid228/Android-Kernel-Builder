name: "Build kernels"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        repos: [ { "kernelSource": { "name": "A137F", "repo": "https://github.com/Tamzid228/my-kernel-source", "branch": "main", "device": "a13ve" } } ]
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libncurses-dev libfl-dev

      - name: "⭐ Get kernel source"
        run: |
          git clone --depth=1 -b ${{ matrix.repos.kernelSource.branch }} ${{ matrix.repos.kernelSource.repo }} ${{ matrix.repos.kernelSource.name }}
          cd ./${{ matrix.repos.kernelSource.name }}
          # Fix common Clang unknown argument errors
          find . -type f -name "Makefile*" -exec sed -i 's/-mno-global-merge//g' {} +
          find . -type f -name "Makefile*" -exec sed -i 's/-fno-var-tracking-assignments//g' {} +

      - name: "⭐ Get toolchain"
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang
          chmod -R +x ./clang/bin

      - name: "🔨 Build"
        run: |
          CLANG_ROOT=$(pwd)/clang
          export PATH=${CLANG_ROOT}/bin:$PATH
          cd ./${{ matrix.repos.kernelSource.name }}
          
          # Force the build to use Clang toolchain correctly
          # IMPORTANT: No spaces before the backslashes '\'
          MAKE_ARGS="ARCH=arm64 \
          LLVM=1 \
          LLVM_IAS=1 \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          HOSTCC=clang \
          HOSTCXX=clang++ \
          HOSTLD=ld.lld \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-"

          # Clean, Config, and Build
          make $MAKE_ARGS clean mrproper
          make $MAKE_ARGS ${{ matrix.repos.kernelSource.device }}_defconfig
          make $MAKE_ARGS -j$(nproc --all)

      - name: "💛 Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image-Samsung-A13
          path: ./${{ matrix.repos.kernelSource.name }}/arch/arm64/boot/Image

       - name: "💙 Upload Image.gz"
         uses: actions/upload-artifact@v4
         with:
          name: Image.gz(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

       - name: "💜 Upload dtb"
         uses: actions/upload-artifact@v4
         with:
          name: dtb(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

       - name: "❤️ Upload dtbo.img"
         uses: actions/upload-artifact@v4
         with:
          name: dtbo.img(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7
