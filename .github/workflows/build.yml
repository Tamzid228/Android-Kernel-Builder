name: "Auto-Diagnostic Kernel Builder"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "⭐ Prepare Environment"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libncurses-dev libfl-dev

      - name: "⭐ Fresh Download"
        run: |
          rm -rf A137F clang
          git clone --depth=1 -b main https://github.com/Tamzid228/my-kernel-source A137F
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang
          chmod -R +x ./clang/bin

      - name: "🔍 Diagnostic: Find Configs"
        run: |
          echo "Listing all available Samsung-related configs:"
          find A137F/arch/arm64/configs/ -name "*ve*" || echo "No 've' configs found"
          echo "---------------------------------------"
          find A137F/arch/arm64/configs/ -name "*defconfig*" | head -n 20

      - name: "🔨 Build"
        run: |
          export PATH=$(pwd)/clang/bin:$PATH
          cd A137F
          
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CC=clang
          export LD=ld.lld
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # Clean
          make clean mrproper
          
          # This line tries to find the config automatically. 
          # If it fails, it will list all configs and stop so you can pick the right one.
          CONF=$(find arch/arm64/configs/ -name "*a13ve_defconfig*" | sed 's|arch/arm64/configs/||')
          
          if [ -z "$CONF" ]; then
            echo "ERROR: Could not find a13ve_defconfig automatically."
            exit 1
          fi
          
          echo "Building with config: $CONF"
          make $CONF
          make -j$(nproc --all)

      - name: "💛 Upload Image"
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image
          path: A137F/arch/arm64/boot/Image
