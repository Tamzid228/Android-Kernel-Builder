name: "Manual Force Kernel Builder"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "⭐ Install Prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libncurses-dev libfl-dev

      - name: "⭐ Fresh Download"
        run: |
          rm -rf A137F clang
          git clone --depth=1 -b main https://github.com/Tamzid228/my-kernel-source A137F
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang
          chmod -R +x ./clang/bin

      - name: "🔨 Build (Manual Path)"
        run: |
          export PATH=$(pwd)/clang/bin:$PATH
          cd A137F
          
          # Environment
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CC=clang
          export LD=ld.lld
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # Fix Makefile flags
          find . -type f -name "Makefile*" -exec sed -i 's/-mno-global-merge//g' {} +
          
          make clean mrproper
          
          # FORCE THE PATH: Samsung usually puts it here
          # We try the vendor path first, then the root path
          if [ -f "arch/arm64/configs/vendor/a13ve_defconfig" ]; then
             make vendor/a13ve_defconfig
          else
             make a13ve_defconfig
          fi
          
          make -j$(nproc --all)

      - name: "💛 Upload Final Image"
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-A13-Kernel
          path: A137F/arch/arm64/boot/Image
