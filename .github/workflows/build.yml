name: "Search & Destroy Builder"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "⭐ System Prep"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libncurses-dev libfl-dev

      - name: "⭐ Wipe & Download"
        run: |
          rm -rf kernel_workspace clang
          git clone --depth=1 -b main https://github.com/Tamzid228/my-kernel-source kernel_workspace
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang
          chmod -R +x ./clang/bin

      - name: "🚀 Force Find Config"
        run: |
          cd kernel_workspace
          # Find any file containing 'a13ve' and 'defconfig' anywhere in the folder
          TARGET_CONFIG=$(find . -name "*a13ve*defconfig*" | head -n 1)
          
          if [ -z "$TARGET_CONFIG" ]; then
            echo "❌ ERROR: No config found for a13ve! Checking all configs..."
            ls arch/arm64/configs/
            exit 1
          fi
          
          echo "✅ Found config at: $TARGET_CONFIG"
          # Copy it to the standard location so 'make' sees it easily
          cp "$TARGET_CONFIG" arch/arm64/configs/forced_defconfig

      - name: "🔨 The Nuclear Build"
        run: |
          export PATH=$(pwd)/clang/bin:$PATH
          cd kernel_workspace
          
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CC=clang
          export LD=ld.lld
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # Fix common Samsung Makefile bugs
          find . -type f -name "Makefile*" -exec sed -i 's/-mno-global-merge//g' {} +
          
          make clean mrproper
          make forced_defconfig
          make -j$(nproc --all)

      - name: "💛 Final Output"
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-A13-Kernel-Image
          path: kernel_workspace/arch/arm64/boot/Image
