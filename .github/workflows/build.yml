name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat  ${{ env.CONFIGURATION }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}

      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}

      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig

      withKernelSU: ${{ matrix.repos.withKernelSU }}
    steps:
       - name: "⭐ Get toolchains"
         run: |
          mkdir -p ./clang
          git clone --depth=1 -b ${{ matrix.repos.toolchains[0].branch }} ${{ matrix.repos.toolchains[0].repo }} ./clang
          chmod -R +x ./clang/bin

       - name: "⭐ Generate build arguments"
         id: generate-args
         run: |
          # We use $(pwd) to get the absolute path so 'make' never gets lost
          CLANG_ROOT=$(pwd)/clang
          
          args="ARCH=${{ matrix.repos.params.ARCH }} \
          CC=${CLANG_ROOT}/bin/clang \
          NM=${CLANG_ROOT}/bin/llvm-nm \
          OBJCOPY=${CLANG_ROOT}/bin/llvm-objcopy \
          OBJDUMP=${CLANG_ROOT}/bin/llvm-objdump \
          STRIP=${CLANG_ROOT}/bin/llvm-strip \
          LD=${CLANG_ROOT}/bin/ld.lld \
          AR=${CLANG_ROOT}/bin/llvm-ar \
          CROSS_COMPILE=${CLANG_ROOT}/bin/aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=${CLANG_ROOT}/bin/arm-linux-gnueabi- \
          CLANG_TRIPLE=aarch64-linux-gnu- "
          
          echo "args=${args}" >> $GITHUB_OUTPUT
       
       - name: "🔨 Make defconfig"
         working-directory: ./${{ env.kernelDir }}
         run: |
          make O=../${{ env.OUT_DIR }} ARCH=arm64 ${{ steps.generate-args.outputs.args }} ${{ env.DEFCONFIG_NAME }}
          
       - name: "🧱 Build kernel"
         working-directory: ./${{ env.kernelDir }}
         run: |
          make O=../${{ env.OUT_DIR }} ${{ steps.generate-args.outputs.args }} -j$(nproc --all)

       - name: "💛 Upload Image"
         uses: actions/upload-artifact@v4
         with:
          name: Image(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image
          if-no-files-found: ignore
          retention-days: 7

       - name: "💙 Upload Image.gz"
         uses: actions/upload-artifact@v4
         with:
          name: Image.gz(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

       - name: "💜 Upload dtb"
         uses: actions/upload-artifact@v4
         with:
          name: dtb(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

       - name: "❤️ Upload dtbo.img"
         uses: actions/upload-artifact@v4
         with:
          name: dtbo.img(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7
