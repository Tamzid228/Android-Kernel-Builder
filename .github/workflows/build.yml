name: "Unified Kernel Builder"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "⭐ Setup Environment"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libncurses-dev libfl-dev

      - name: "⭐ Download Source & Toolchain"
        run: |
          # Clone Kernel Source
          git clone --depth=1 -b main https://github.com/Tamzid228/my-kernel-source A137F
          
          # Clone Toolchain
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang
          chmod -R +x ./clang/bin

      - name: "🔨 Compile Kernel"
        run: |
          export PATH=$(pwd)/clang/bin:$PATH
          cd A137F
          
          # Setup Build Flags
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CC=clang
          export LD=ld.lld
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          # Fix known Makefile errors
          find . -type f -name "Makefile*" -exec sed -i 's/-mno-global-merge//g' {} +
          
          # Build
          make clean mrproper
          make a13ve_defconfig
          make -j$(nproc --all)

      - name: "💛 Upload Result"
        uses: actions/upload-artifact@v4
        with:
          name: Samsung-A13-Kernel
          path: A137F/arch/arm64/boot/Image
